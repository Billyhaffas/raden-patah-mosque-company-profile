<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Masjid Raden Patah</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="">

    <!-- ================= NAVBAR ================= -->

    <div id="navbar" class="w-full h-16 overflow-hidden"></div>

    <!-- ================= KONTEN CONTACT US ================= -->
    <!-- Form -->

    <h1 class=" p-8 font-bold text-4xl mb-6">Lebih Dekat Dengan Kami</h1>

    <form class="px-8 pt-8 pb-8 p">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <!-- First name -->
            <div>
                <label class="block text-xs font-semibold tracking-wide text-slate-600 mb-2">Nama Depan</label>
                <input type="text" placeholder="Nama Depan" class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-slate-800 placeholder-slate-400
                            focus:outline-none focus:ring-2 focus:ring-sky-400">
            </div>
            <!-- Last name -->
            <div>
                <label class="block text-xs font-semibold tracking-wide text-slate-600 mb-2">Nama belakang</label>
                <input type="text" placeholder="Masukkan Nama belakang" class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-slate-800 placeholder-slate-400
                            focus:outline-none focus:ring-2 focus:ring-sky-400 ">
            </div>
            <!-- Email -->
            <div>
                <label class="block text-xs font-semibold tracking-wide text-slate-600 mb-2">Email</label>
                <input type="email" placeholder="Masukkan Email Anda" class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-slate-800 placeholder-slate-400
                            focus:outline-none focus:ring-2 focus:ring-sky-400 ">
            </div>
            <!-- Phone -->
            <div>
                <label class="block text-xs font-semibold tracking-wide text-slate-600 mb-2">Nomor Telepon</label>
                <input type="tel" placeholder="Masukkan nomor telepon" class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-slate-800 placeholder-slate-400
                            focus:outline-none focus:ring-2 focus:ring-sky-400 ">
            </div>
        </div>

        <!-- Message -->
        <div class="mt-5">
            <label class="block text-xs font-semibold tracking-wide text-slate-600 mb-2">Apa Kendala yang kamu Alami</label>
            <textarea id="message" rows="4" placeholder="Tuangkan Kendalamu"
                class="w-full rounded-md border border-slate-200 bg-white px-3 py-2 text-slate-800 placeholder-slate-400
                             focus:outline-none focus:ring-2 focus:ring-sky-400 resize-y"></textarea>
        </div>

        <!-- Submit -->
        <div class="mt-7">
            <button type="submit" class="w-full rounded-md bg-[#19305D] text-white font-semibold py-3
                           hover:bg-[#15284D] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-400">
                Submit
            </button>
        </div>
    </form>
    </section>


    <!-- ================= FOOTER ================= -->
    <div id="footer"></div>
    <script src="../js/navbar_footer.js"></script>


</body>


</html>
